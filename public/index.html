<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corumba T.I.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</head>

<body class="padding-24">
    <ul class="bubbles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div style="max-width: 1280px; margin-left: auto; margin-right: auto; position: relative; z-index: 10;" class="px-6">

        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(30, 41, 59, 0.6);">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img src="https://corumba.digital/assets/c.regular.svg" style="width: 2rem; height: 2rem; opacity: 0.8;" onerror="this.style.display='none'">
                <div>
                    <h1 style="font-size: 1.875rem; font-weight: 700; letter-spacing: -0.025em;">CORUMBA_All</h1>
                    <p style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em;">Corumba T.I</p>
                </div>
            </div>

            <button
                id="btn-add-printer"
                onclick="abrirModalImpressora()"
                style="background-color: #2563eb; padding: 0.625rem 2.5rem; border-radius: 0.75rem; font-weight: 700; text-transform: uppercase; font-size: 0.875rem; letter-spacing: 0.05em; transition: background-color 0.2s; cursor: pointer; border: none; color: white;"
                onmouseover="this.style.backgroundColor='#3b82f6'"
                onmouseout="this.style.backgroundColor='#2563eb'">
                + Impressora
            </button>
        </header>

        <nav style="display: flex; gap: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(30, 41, 59, 0.6); padding-bottom: 0;">
            <button
                class="tab-btn active"
                data-tab="impressoras"
                style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: none; cursor: pointer; color: white;">
                Impressoras
            </button>
            <button
                class="tab-btn"
                data-tab="computadores"
                style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: none; cursor: pointer; color: #64748b;">
                Computadores
            </button>
            <button
                class="tab-btn"
                data-tab="Rb"
                style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: none; cursor: pointer; color: #64748b;">
                Infraestrura
            </button>
            <button
                class="tab-btn"
                data-tab="recados"
                style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: none; cursor: pointer; color: #64748b;">
                Quadro de recados
            </button>
            <button
                class="tab-btn"
                data-tab="atendimentos"
                style="padding-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: none; cursor: pointer; color: #64748b;">
                Atendimentos
            </button>
            
            
             
        </nav>
<!-- essa parte do código é para os paineis, todo painel novo te que ter um "tab-panel" para ser a identificação de qual painel está sendo selecionado, o que estiver selecionado terá o "activate" na frente, ele fará com que os outros paineis sejam display: none. adicionando eles numa lista de paineis desativados-->
        <div id="tab-impressoras" class="tab-panel active">
            <div id="arvore" style="display: flex; flex-direction: column; gap: 1rem;"></div>
        </div>

        <div id="tab-recados" class="tab-panel" style="display: none;">
             <div style="margin: 2rem auto;">
                <h2 style="font-size: 1.5rem; font-weight: 700; color: whitesmoke; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <span></span> MURAL DE AVISOS
                </h2>
                <div style="margin-bottom: 1.5rem;">
                    <button onclick="abrirModalRecado()" style="background-color:  #2563eb; border-radius: 0.75rem; height: 25px; width: 140px; font-weight: 700; text-transform: uppercase; font-size: 12px; color: white; cursor: pointer; transition: 0.2s" onmouseover="this.style.backgroundColor=`#3b82f6`" onmouseout="this.style.backgroundColor=`#2563eb`">
                        + novo recado
                    </button>
                </div>
                <div id="modal-recado" style="display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 100; padding: 1rem;">
                    <div style="background-color: #0d1117;border: 1px solid rgba(245, 158, 11, 0.4); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 28rem; box-shadow: 0 20px 25px -5px rgba (0, 0, 0, 0.5);">
                        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: #2563eb; "> Novo recado </h2>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <input id="titulo-lembrete" placeholder="Titulo do lembrete(imprtante)" style="width:100%; background-color:#0f172a; border: 1px solid #334155; padding: 6px; border-radius: 1rem; color: white; outline: none; box-sizing: border-box;">
                            <textarea id="Desc-lembrete" placeholder="Detalhe o lembrete" style="width: 100%; background-color:#0f172a; border: 1px solid #334155; padding: 0.8rem; border-radius: 0.8rem; color: white; outline: none; height: 120px; resize: none; box-sizing: border-box;"></textarea>
                            <textarea id="Corumbinha" placeholder="Qual é o seu nome." style="width: 100%; height: 35px; background-color: #0f172a; border-radius: 20px; padding: 3px; color: white; outline: none; box-sizing: border-box; resize: none;"></textarea>
                             <div style="display: flex; align-items: center; gap: 7px;">  
                                <input type="checkbox" id="Recado-urgente" style="cursor: pointer; width:1.2rem; height: 1.2rem;">
                                <label for="Recado-urgente" style="font-size: 0.8rem; color:#94a3b8; cursor: pointer ;">Marcar como urgente</label>
                             </div>
                             <div style="display: flex; gap: 0.7rem; padding-top: 20px;">
                                <button onclick="fecharModalrecado()" style=" flex: 1; background-color: #1e293b; padding: 0.8rem; border-radius: 0.7rem; color: white; border: none; cursor: pointer; font-weight: 700;"> Descartar </button>  
                                <button onclick="salvarRecado()" style=" flex: 1; background-color: #1e293b; padding: 0.8rem; border-radius: 0.7rem; color: white; border: none; cursor: pointer; font-weight: 700;"> Salvar </button>
                             </div>
                        </div>
                    </div>
                </div>
                <div id="Recados-importantes" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem;"> </div>
             </div>
        </div>

       <div id="tab-computadores" class="tab-panel" style="display: none;">
    <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;">
        <label for="filtro-cliente" style="color: #64748b; font-size: 0.875rem; font-weight: 600;">FILTRAR POR CLIENTE:</label>
        <select id="filtro-cliente" onchange="aplicarFiltroComputadores()" style="background-color: #0f172a; border: 5px solid #334155; color: white; padding: 0.5rem; border-radius: 1rem; outline: none; cursor: pointer;" onmouseover= "this.style.backgroundColor=`#64748b`" onmouseout="this.style.backgroundColor=`#64748b`";>
            <option value="todos">TODOS</option>
        </select>
    </div>
    
    <div id="lista-computadores" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;"></div>
</div>

    <div id="modal-impressora" style="display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 1rem;">
        <div style="background-color: #0d1117; border: 1px solid rgba(100, 116, 139, 0.6); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 28rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: #60a5fa;">NOVA IMPRESSORA</h2>
            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <input
                    id="in-unit"
                    placeholder="CLIENTE / UNIDADE"
                    style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; outline: none; font-size: 0.875rem; color: white; transition: border-color 0.2s; box-sizing: border-box;">
                <input
                    id="in-name"
                    placeholder="SETOR"
                    style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; outline: none; font-size: 0.875rem; color: white; transition: border-color 0.2s; box-sizing: border-box;">
                <input
                    id="in-ip"
                    placeholder="ENDEREÇO IP"
                    style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; outline: none; font-size: 0.875rem; color: white; transition: border-color 0.2s; box-sizing: border-box;">
                <input
                    id="in-model"
                    placeholder="MODELO ex: L6270"
                    style="width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; outline: none; font-size: 0.875rem; color: white; transition: border-color 0.2s; box-sizing: border-box;">
                <div style="display: flex; gap: 0.75rem; padding-top: 0.5rem;">
                    <button
                        onclick="fecharModalImpressora()"
                        style="flex: 1; background-color: #1e293b; padding: 0.875rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.875rem; border: none; cursor: pointer; color: white; transition: background-color 0.2s;"
                        onmouseover="this.style.backgroundColor='#334155'"
                        onmouseout="this.style.backgroundColor='#1e293b'">
                        CANCELAR
                    </button>
                    <button
                        onclick="salvarImpressora()"
                        class="button-salvar"
                        onmouseover="this.style.backgroundColor='#3b82f6'"
                        onmouseout="this.style.backgroundColor='#2563eb'">
                        SALVAR
                    </button>
                </div>
            </div>
        </div>
    </div>
<div id="tab-Rb" class="tab-panel" style="display: none;">

    <div id="painel-infra" style="display: flex; flex-wrap: wrap; gap: 1.5rem; padding: 1.5rem;"></div>
    
    <div class= "fixed bottom-10 right-10 flex flex-col gap-2" >
        <button onclick="adicionarEquipamento('rb')" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-full shadow-lg text-white font-bold">+ RB</button>
        <button onclick="adicionarEquipamento('switch')" class="bg-slate-700 hover:bg-slate-600 p-4 rounded-full shadow-lg text-white font-bold">+ Switch</button>
    </div>     
</div>
<div id="tab-atendimentos" class="tab-panel" display="none">
    <button
    onclick="AbrirModalAtendimento()" 
    style="display:flex; width: 150px; height: 25px; background-color: #2563eb; font-size: 12px; border: none; border-radius: 9px; justify-content: center; align-items: center; position: relative;" > Adicionar atendimentos
    </button>
    <div id="modal-atendimento" style="display: none; color:white; position: fixed; inset: 0; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div style="height: 600px; width: 400px; border-radius: 12px; background-color: #1e293b; position: relative;  font-size: 20px; border: 1px solid #60a5fa; display:flex; flex-direction: column; align-items: center; ">
            <span style=" display: flex; justify-content: center; font-weight: 800; margin-top: 20px;" onmouseover="this.style.color= `white`" onmouseout="this.style.color=`#2563eb`">Proceder do atendimento</span>
            <div style="height: 100%; max-width: 400px; width: 350px;  display: flex; flex-direction: column; gap: 12px; margin-top: 12px; padding: 12px;">
                <input id="NomeAtendimento" type="text" placeholder="Motivo atendimento" style=" text-align: center; width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; outline: none; font-size: 0.875rem; color: white; transition: border-color 0.2s; box-sizing: border-box; justify-content: start;">
                 <input id="Local" type="text" placeholder="Local do atendimento" style="text-align: center; width: 100%; background-color: #0f172a; border: 1px solid #334155; padding: 0.875rem; border-radius: 0.75rem; outline: none; font-size: 0.875rem; color: white; transition: border-color 0.2s; box-sizing: border-box;">
                 <label id="RtdEqp" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: white;">
                    <span>Marque se fez a retirada de equipamento</span>
                    <input type="checkbox">
                </label>
                <label>
                    <span style="font-size: 12px; color: white;">Data de chegada</span>
                    <input id="DataChegada" type="datetime-local" style="background-color: #1e293b; width: 260px; height: 30px; border: 1px solid white; border-radius: 12px; padding: 7px;">
                </label>
                 <textarea name="Atd" id="descricaoAtd" placeholder="Descreva o atendimento, possíveis causas ou soluções" style="text-align: center ; width: 100%; color: black; background-color: #0f172a; border: 1px solid #334155; border-radius: 9px; font-size: 13px; color: white; box-sizing: border-box; height: 100px;"></textarea>
                 <div style="display: flex; flex-direction: row; gap: 80px;align-items:flex-end; margin-top: 70px; padding: 20px;">
                    <button class="button-cancelar">Cancelar</button>

                    <button class="button-salvar">Salvar</button>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
